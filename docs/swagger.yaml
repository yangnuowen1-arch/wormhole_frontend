info:
  contact: {}
  description: 'Wormhole 后端服务 API 文档。Keycloak SSO 模式下，前端通过 /auth/sso/login 发起登录，后端写入
    HttpOnly Cookie；前端鉴权判断请调用 /users/me 并携带 credentials: include。普通业务接口要求登录，/admin
    开头的管理接口额外要求当前用户拥有 admin 角色。'
  title: Wormhole Backend API
  version: "1.0"
paths:
  /admin/carousel-slides:
    get:
      description: 管理员查看全部幻灯片，可按 status 过滤。
      parameters:
      - description: 状态：1=启用，0=停用；不传返回全部
        in: query
        name: status
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 幻灯片列表
          schema:
            $ref: '#/definitions/response.APIResponse'
        "400":
          description: 参数错误
          schema:
            $ref: '#/definitions/dto.ErrorAPIResponse'
        "401":
          description: 未登录或登录已失效
          schema:
            $ref: '#/definitions/dto.ErrorAPIResponse'
        "403":
          description: 没有权限
          schema:
            $ref: '#/definitions/dto.ErrorAPIResponse'
        "500":
          description: 获取幻灯片失败
          schema:
            $ref: '#/definitions/dto.ErrorAPIResponse'
      security:
      - BearerAuth: []
      - CookieAuth: []
      summary: 管理员获取幻灯片列表
      tags:
      - admin-carousel-slides
    post:
      consumes:
      - application/json
      description: 管理员新增一张幻灯片。
      parameters:
      - description: 幻灯片
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.CreateCarouselSlideRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 幻灯片
          schema:
            $ref: '#/definitions/response.APIResponse'
        "400":
          description: 参数错误
          schema:
            $ref: '#/definitions/dto.ErrorAPIResponse'
        "401":
          description: 未登录或登录已失效
          schema:
            $ref: '#/definitions/dto.ErrorAPIResponse'
        "403":
          description: 没有权限
          schema:
            $ref: '#/definitions/dto.ErrorAPIResponse'
        "500":
          description: 新增幻灯片失败
          schema:
            $ref: '#/definitions/dto.ErrorAPIResponse'
      security:
      - BearerAuth: []
      - CookieAuth: []
      summary: 管理员新增幻灯片
      tags:
      - admin-carousel-slides
  /admin/carousel-slides/{id}:
    patch:
      consumes:
      - application/json
      description: 管理员部分更新一张幻灯片。
      parameters:
