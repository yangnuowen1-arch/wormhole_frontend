securityDefinitions:
  BearerAuth:
    description: '兼容 Bearer token：Authorization: Bearer <token>'
    in: header
    name: Authorization
    type: apiKey
  CookieAuth:
    description: SSO 登录成功后由后端写入的 HttpOnly 会话 Cookie，前端 JS 不能读取，fetch/axios 请求需携带 credentials/withCredentials。
    in: cookie
    name: wormhole_session
    type: apiKey
